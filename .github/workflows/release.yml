name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag override (for manual runs, e.g. 0.0.1-test)'
        required: false
        default: ''

permissions:
  contents: read

env:
  IMAGE: durableworkflow/server

jobs:
  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # On a release tag like 0.1.0, produces tags:
          #   durableworkflow/server:0.1.0
          #   durableworkflow/server:0.1
          #   durableworkflow/server:0
          #   durableworkflow/server:latest
          # workflow_dispatch with an input uses that as a single tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # Workflow package versioning strategy:
      # - During alpha/beta: use branch 'v2' (automatic pickup of latest changes)
      # - For stable releases: use tag '2.0.0' (pinned, reproducible builds)
      #
      # Alpha/beta tags (2.0.0-alpha.1, 2.0.0-beta.1) are for visibility/changelog only.
      # The branch approach ensures all server releases automatically get latest workflow v2.
      # When releasing stable 2.0.0, change WORKFLOW_PACKAGE_REF to '2.0.0'.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            WORKFLOW_PACKAGE_REF=v2

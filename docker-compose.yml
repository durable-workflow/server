services:
  bootstrap:
    build:
      context: .
      args:
        WORKFLOW_PACKAGE_SOURCE: ${WORKFLOW_PACKAGE_SOURCE:-https://github.com/durable-workflow/workflow.git}
        WORKFLOW_PACKAGE_REF: ${WORKFLOW_PACKAGE_REF:-v2}
        WORKFLOW_PACKAGE_COMMIT: ${WORKFLOW_PACKAGE_COMMIT:-}
    command: ["server-bootstrap"]
    environment:
      APP_NAME: "Durable Workflow Server"
      APP_ENV: local
      APP_KEY: "${APP_KEY}"
      APP_VERSION: "${APP_VERSION:-2.0.0}"
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: durable_workflow
      DB_USERNAME: workflow
      DB_PASSWORD: workflow
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      DW_AUTH_DRIVER: "${DW_AUTH_DRIVER:-${WORKFLOW_SERVER_AUTH_DRIVER:-token}}"
      DW_AUTH_TOKEN: "${DW_AUTH_TOKEN:-${WORKFLOW_SERVER_AUTH_TOKEN:-}}"
      DW_WORKER_TOKEN: "${DW_WORKER_TOKEN:-${WORKFLOW_SERVER_WORKER_TOKEN:-}}"
      DW_OPERATOR_TOKEN: "${DW_OPERATOR_TOKEN:-${WORKFLOW_SERVER_OPERATOR_TOKEN:-}}"
      DW_ADMIN_TOKEN: "${DW_ADMIN_TOKEN:-${WORKFLOW_SERVER_ADMIN_TOKEN:-}}"
      DW_AUTH_BACKWARD_COMPATIBLE: "${DW_AUTH_BACKWARD_COMPATIBLE:-${WORKFLOW_SERVER_AUTH_BACKWARD_COMPATIBLE:-true}}"
      DW_METRICS_WORKFLOW_TASK_FAILURE_TYPE_LIMIT: "${DW_METRICS_WORKFLOW_TASK_FAILURE_TYPE_LIMIT:-${WORKFLOW_SERVER_METRICS_WORKFLOW_TASK_FAILURE_TYPE_LIMIT:-20}}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  server:
    build:
      context: .
      args:
        WORKFLOW_PACKAGE_SOURCE: ${WORKFLOW_PACKAGE_SOURCE:-https://github.com/durable-workflow/workflow.git}
        WORKFLOW_PACKAGE_REF: ${WORKFLOW_PACKAGE_REF:-v2}
        WORKFLOW_PACKAGE_COMMIT: ${WORKFLOW_PACKAGE_COMMIT:-}
    ports:
      - "8080:8080"
    environment:
      APP_NAME: "Durable Workflow Server"
      APP_ENV: local
      APP_KEY: "${APP_KEY}"
      APP_VERSION: "${APP_VERSION:-2.0.0}"
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: durable_workflow
      DB_USERNAME: workflow
      DB_PASSWORD: workflow
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      DW_AUTH_DRIVER: "${DW_AUTH_DRIVER:-${WORKFLOW_SERVER_AUTH_DRIVER:-token}}"
      DW_AUTH_TOKEN: "${DW_AUTH_TOKEN:-${WORKFLOW_SERVER_AUTH_TOKEN:-}}"
      DW_WORKER_TOKEN: "${DW_WORKER_TOKEN:-${WORKFLOW_SERVER_WORKER_TOKEN:-}}"
      DW_OPERATOR_TOKEN: "${DW_OPERATOR_TOKEN:-${WORKFLOW_SERVER_OPERATOR_TOKEN:-}}"
      DW_ADMIN_TOKEN: "${DW_ADMIN_TOKEN:-${WORKFLOW_SERVER_ADMIN_TOKEN:-}}"
      DW_AUTH_BACKWARD_COMPATIBLE: "${DW_AUTH_BACKWARD_COMPATIBLE:-${WORKFLOW_SERVER_AUTH_BACKWARD_COMPATIBLE:-true}}"
      DW_METRICS_WORKFLOW_TASK_FAILURE_TYPE_LIMIT: "${DW_METRICS_WORKFLOW_TASK_FAILURE_TYPE_LIMIT:-${WORKFLOW_SERVER_METRICS_WORKFLOW_TASK_FAILURE_TYPE_LIMIT:-20}}"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      args:
        WORKFLOW_PACKAGE_SOURCE: ${WORKFLOW_PACKAGE_SOURCE:-https://github.com/durable-workflow/workflow.git}
        WORKFLOW_PACKAGE_REF: ${WORKFLOW_PACKAGE_REF:-v2}
        WORKFLOW_PACKAGE_COMMIT: ${WORKFLOW_PACKAGE_COMMIT:-}
    command: php artisan queue:work --sleep=1 --tries=3 --max-time=3600
    environment:
      APP_NAME: "Durable Workflow Server"
      APP_ENV: local
      APP_KEY: "${APP_KEY}"
      APP_VERSION: "${APP_VERSION:-2.0.0}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: durable_workflow
      DB_USERNAME: workflow
      DB_PASSWORD: workflow
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      args:
        WORKFLOW_PACKAGE_SOURCE: ${WORKFLOW_PACKAGE_SOURCE:-https://github.com/durable-workflow/workflow.git}
        WORKFLOW_PACKAGE_REF: ${WORKFLOW_PACKAGE_REF:-v2}
        WORKFLOW_PACKAGE_COMMIT: ${WORKFLOW_PACKAGE_COMMIT:-}
    # init: true wires Docker's tini as PID 1 so the `sh -c 'while … sleep 10'`
    # loop reaps any short-lived `php artisan` children instead of leaking
    # them as zombies. Without it the container slowly accumulates defunct
    # PHP processes (TD-S058 / temporalio/docker-compose#211, #241).
    init: true
    command: >-
      sh -c 'while true; do php artisan schedule:evaluate --limit=100; php artisan activity:timeout-enforce --limit=100; php artisan history:prune --limit=100; sleep 10; done'
    environment:
      APP_NAME: "Durable Workflow Server"
      APP_ENV: local
      APP_KEY: "${APP_KEY}"
      APP_VERSION: "${APP_VERSION:-2.0.0}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: durable_workflow
      DB_USERNAME: workflow
      DB_PASSWORD: workflow
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:${MYSQL_VERSION:-8.0}
    environment:
      MYSQL_DATABASE: durable_workflow
      MYSQL_USER: workflow
      MYSQL_PASSWORD: workflow
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
  redis_data:

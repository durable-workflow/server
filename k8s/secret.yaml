# Pod templates also expect externally managed credentials:
# - Secret durable-workflow-database with DB_USERNAME and DB_PASSWORD.
# - Secret durable-workflow-redis with optional REDIS_USERNAME and REDIS_PASSWORD.
# Create those through your secret manager, External Secrets operator, or
# kubectl before running scripts/deploy-k8s.sh.
apiVersion: v1
kind: ConfigMap
metadata:
  name: durable-workflow-config
  namespace: durable-workflow
  labels:
    app.kubernetes.io/name: durable-workflow
data:
  APP_NAME: "Durable Workflow Server"
  APP_ENV: production
  APP_DEBUG: "false"
  DB_CONNECTION: mysql
  DB_HOST: mysql.durable-workflow.svc.cluster.local
  DB_PORT: "3306"
  DB_DATABASE: durable_workflow
  REDIS_HOST: redis.durable-workflow.svc.cluster.local
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  DW_AUTH_DRIVER: token
  DW_AUTH_BACKWARD_COMPATIBLE: "true"
  DW_METRICS_WORKFLOW_TASK_FAILURE_TYPE_LIMIT: "20"
---
apiVersion: v1
kind: Secret
metadata:
  name: durable-workflow-app-secrets
  namespace: durable-workflow
  labels:
    app.kubernetes.io/name: durable-workflow
type: Opaque
stringData:
  APP_KEY: "base64:CHANGE_ME"
  DW_AUTH_TOKEN: "CHANGE_ME"
  DW_WORKER_TOKEN: "CHANGE_ME_WORKER"
  DW_OPERATOR_TOKEN: "CHANGE_ME_OPERATOR"
  DW_ADMIN_TOKEN: "CHANGE_ME_ADMIN"

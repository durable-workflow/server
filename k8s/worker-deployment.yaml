apiVersion: apps/v1
kind: Deployment
metadata:
  name: durable-workflow-worker
  namespace: durable-workflow
  labels:
    app.kubernetes.io/name: durable-workflow
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: durable-workflow
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: durable-workflow
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/durable-workflow/server:latest
          command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--max-time=3600"]
          envFrom:
            - secretRef:
                name: durable-workflow-env
          livenessProbe:
            exec:
              command: ["php", "artisan", "queue:monitor", "default"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi

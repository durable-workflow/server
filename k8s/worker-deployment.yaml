apiVersion: apps/v1
kind: Deployment
metadata:
  name: durable-workflow-worker
  namespace: durable-workflow
  labels:
    app.kubernetes.io/name: durable-workflow
    app.kubernetes.io/component: worker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: durable-workflow
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: durable-workflow
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: durableworkflow/server:0.2
          command: ["server-entrypoint"]
          args: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--max-time=3600"]
          envFrom:
            - configMapRef:
                name: durable-workflow-config
            - secretRef:
                name: durable-workflow-app-secrets
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: durable-workflow-database
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: durable-workflow-database
                  key: DB_PASSWORD
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: durable-workflow-redis
                  key: REDIS_USERNAME
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: durable-workflow-redis
                  key: REDIS_PASSWORD
                  optional: true
          livenessProbe:
            exec:
              command: ["php", "artisan", "queue:monitor", "default"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi

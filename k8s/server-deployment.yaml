apiVersion: apps/v1
kind: Deployment
metadata:
  name: durable-workflow-server
  namespace: durable-workflow
  labels:
    app.kubernetes.io/name: durable-workflow
    app.kubernetes.io/component: server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: durable-workflow
      app.kubernetes.io/component: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: durable-workflow
        app.kubernetes.io/component: server
    spec:
      imagePullSecrets:
        - name: durable-workflow-registry
      containers:
        - name: server
          image: ghcr.io/durable-workflow/server:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: durable-workflow-config
            - secretRef:
                name: durable-workflow-app-secrets
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: durable-workflow-database
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: durable-workflow-database
                  key: DB_PASSWORD
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: durable-workflow-redis
                  key: REDIS_USERNAME
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: durable-workflow-redis
                  key: REDIS_PASSWORD
                  optional: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: durable-workflow-server
  namespace: durable-workflow
  labels:
    app.kubernetes.io/name: durable-workflow
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: durable-workflow
    app.kubernetes.io/component: server
  ports:
    - port: 8080
      targetPort: http
      name: http
